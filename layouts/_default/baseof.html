<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default .Site.Language.Lang }}">
{{- partial "head.html" . -}}

<body class="font-sans text-base md:text-sm lg:text-lg font-light">
    
    <div class="min-h-screen flex flex-col bg-gray-100">

        <!-- some content !-->

        {{- partial "header.html" . -}}
        <div class="container mx-auto mt-4 flex-grow" id="content">
            <div class="lg:mx-5">
                {{- block "main" . }}{{- end }}
            </div>
        </div>
        {{- partial "footer.html" . -}}

    </div>
    <script async src="https://apis.google.com/js/platform.js"></script>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</body>

</html>
